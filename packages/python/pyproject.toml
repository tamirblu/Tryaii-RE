[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tryaii-dre"
version = "0.1.0"
description = "TryAii Diff Routing Engine -- Embedding-based AI model router. Understands your prompt semantically and routes to the best model based on benchmarks, cost, speed, and quality."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
authors = [
    { name = "TryAII Team" }
]
keywords = [
    "ai", "llm", "routing", "embeddings", "model-selection",
    "openrouter", "benchmark", "prompt-classification"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "numpy>=1.24.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
embeddings = ["sentence-transformers>=2.2.0"]
openai = ["openai>=1.0.0"]
openrouter = ["httpx>=0.25.0"]
redis = ["redis>=5.0.0"]
all = [
    "sentence-transformers>=2.2.0",
    "openai>=1.0.0",
    "httpx>=0.25.0",
    "redis>=5.0.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
    "mypy>=1.5.0",
]

[project.scripts]
tryaii-dre = "tryaii_dre.cli.main:cli"

[project.urls]
Homepage = "https://github.com/tamirblu/Tryaii-RE"
Documentation = "https://github.com/tamirblu/Tryaii-RE#readme"
Repository = "https://github.com/tamirblu/Tryaii-RE"
Issues = "https://github.com/tamirblu/Tryaii-RE/issues"

[tool.hatch.build.targets.wheel]
packages = ["tryaii_dre"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true

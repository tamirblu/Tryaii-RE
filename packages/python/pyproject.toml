[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tryaii-dre"
version = "0.2.2"
description = "TryAii Diff Routing Engine -- Embedding-based AI model router. Understands your prompt semantically and routes to the best model based on benchmarks, cost, speed, and quality."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
authors = [
    { name = "TryAII Team", email = "ceo@tryaii.com" }
]
keywords = [
    "ai", "llm", "routing", "embeddings", "model-selection",
    "openrouter", "benchmark", "prompt-classification"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "numpy>=1.24.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "sentence-transformers>=2.2.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
openrouter = ["httpx>=0.25.0"]
# Planned: Redis-backed distributed cache. Not yet implemented; installing this
# extra has no effect on caching today (the in-memory LRU cache is used).
redis = ["redis>=5.0.0"]
all = [
    "openai>=1.0.0",
    "httpx>=0.25.0",
    "redis>=5.0.0",
]
dev = [
    "build>=1.2.0",
    "twine>=5.0.0",
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
    "mypy>=1.5.0",
]

[project.scripts]
tryaii-dre = "tryaii_dre.cli.main:cli"

[project.urls]
Homepage = "https://github.com/tamirblu/Tryaii-RE"
Documentation = "https://github.com/tamirblu/Tryaii-RE#readme"
Repository = "https://github.com/tamirblu/Tryaii-RE"
Issues = "https://github.com/tamirblu/Tryaii-RE/issues"

[tool.hatch.build.targets.wheel]
packages = ["tryaii_dre"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = [
    # UP045 rewrites `Optional[X]` to `X | None`. This package targets Python 3.9
    # and uses pydantic, which evaluates annotations at runtime -- `X | None`
    # raises TypeError on 3.9. Keep `Optional[...]` until the floor is >= 3.10.
    "UP045",
]

[tool.ruff.lint.per-file-ignores]
# main.py embeds the eval dashboard's HTML/CSS as triple-quoted string literals;
# wrapping those lines to 100 cols would corrupt the generated markup.
"tryaii_dre/cli/main.py" = ["E501"]
# embedding.py holds the EASY/HARD difficulty exemplars as natural-language
# string literals; these must stay verbatim (and match the Node SDK), so the
# 100-col limit doesn't apply to them.
"tryaii_dre/classifiers/embedding.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true

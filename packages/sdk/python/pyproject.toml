[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tryaii-dre-sdk"
version = "0.1.0"
description = "High-level SDK for TryAii-DRE -- unified client with async support and framework middleware"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "TryAii" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "tryaii-dre>=0.1.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.100.0",
    "starlette>=0.27.0",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
]

[project.urls]
Homepage = "https://github.com/tamirblu/Tryaii-RE"
Repository = "https://github.com/tamirblu/Tryaii-RE"

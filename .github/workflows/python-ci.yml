name: Python CI

on:
  push:
    paths:
      - "packages/python/**"
      - "shared/**"
  pull_request:
    paths:
      - "packages/python/**"
      - "shared/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: packages/python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/python/pyproject.toml

      - name: Install CPU-only torch (skip ~3.7 GB of CUDA wheels)
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check tryaii_dre/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  publish-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Smoke test -- install wheel in clean env
        run: |
          python -m venv /tmp/smoke-env
          /tmp/smoke-env/bin/pip install dist/*.whl
          /tmp/smoke-env/bin/tryaii-dre --help >/dev/null
          /tmp/smoke-env/bin/python - <<'PY'
          import numpy as np
          import sentence_transformers

          class FakeSentenceTransformer:
              def __init__(self, model_name: str, device=None):
                  self.model_name = model_name
                  self.device = device

              def encode(
                  self,
                  texts,
                  convert_to_numpy=True,
                  normalize_embeddings=False,
                  batch_size=32,
              ):
                  if isinstance(texts, str):
                      texts = [texts]

                  vectors = []
                  for text in texts:
                      seed = abs(hash(text)) % (2**32)
                      rng = np.random.RandomState(seed)
                      vector = rng.randn(384).astype(np.float32)
                      if normalize_embeddings:
                          vector /= np.linalg.norm(vector)
                      vectors.append(vector)

                  return np.stack(vectors)

          sentence_transformers.SentenceTransformer = FakeSentenceTransformer

          from tryaii_dre import Router

          router = Router()
          result = router.route("Write a Python function to merge sorted arrays")
          assert result.best_model, "No model returned"
          print(f"Smoke test passed: best_model={result.best_model}")
          PY
